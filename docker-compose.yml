services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: wolfz
      POSTGRES_PASSWORD: wolfz
      POSTGRES_DB: wolfz
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    env_file:
      - ./backend/.env.example
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app

volumes:
  pgdata:
